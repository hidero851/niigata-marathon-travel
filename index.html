<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <title>新潟マラソンナビ | 走る旅で、新潟をもっと好きになる。</title>
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="apple-touch-icon" href="/images/favicon.png" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-F3DYQK153E"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-F3DYQK153E');
    </script>
    <!-- Google Translate widget styles -->
    <style>
      #google_translate_element {
        position: fixed;
        bottom: 72px;
        right: 16px;
        z-index: 9998;
      }
      /* デフォルトの上部バーを非表示 */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      /* ウィジェットの見た目を整える */
      .goog-te-gadget-simple {
        background: rgba(255,255,255,0.95) !important;
        border: 1px solid #e5e7eb !important;
        border-radius: 10px !important;
        padding: 5px 10px !important;
        font-size: 13px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
        cursor: pointer !important;
      }
      .goog-te-gadget-simple span { color: #374151 !important; }
      .goog-te-gadget-simple .goog-te-menu-value span:last-child { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Google Translate widget -->
    <div id="google_translate_element"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'ja',
          includedLanguages: 'ja,en,zh-CN,zh-TW,ko',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
